name: External beta feedback
description: Report a privacy-safe scan outcome or confirmed fix without sharing plist contents or secrets.
title: "[Beta] "
labels:
  - beta-feedback
body:
  - type: markdown
    attributes:
      value: |
        Thank you for testing AgentLaunch Doctor. GitHub issues are public.

        Share only aggregate counts and finding codes. Never paste plist contents, labels, filenames, paths, logs, tokens, credentials, account details, or an unreviewed report.
  - type: input
    id: version
    attributes:
      label: AgentLaunch Doctor version
      placeholder: "0.2.0"
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: Installation method
      options:
        - GitHub Release
        - Homebrew
        - Built from source
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS major version and architecture
      placeholder: "macOS 15, Apple silicon"
    validations:
      required: true
  - type: input
    id: agent_count
    attributes:
      label: Number of LaunchAgents scanned
      description: Enter only a number. Do not list labels or filenames.
      placeholder: "8"
    validations:
      required: true
  - type: input
    id: finding_codes
    attributes:
      label: Relevant finding codes
      description: Codes only, such as program.not-found or runtime.last-exit.
      placeholder: "program.not-found"
    validations:
      required: true
  - type: dropdown
    id: outcome
    attributes:
      label: Did the finding lead to a confirmed fix?
      options:
        - Yes
        - No
        - Not sure yet
        - The finding was a false high-severity result
    validations:
      required: true
  - type: textarea
    id: safe_summary
    attributes:
      label: Privacy-safe outcome summary
      description: Describe the generic failure and outcome. Do not include private identifiers or copied logs.
      placeholder: "The executable had moved after an update. Correcting the path through the product's documented installer restored the service."
    validations:
      required: true
  - type: dropdown
    id: repeat_use
    attributes:
      label: Have you run the tool before?
      options:
        - First scan
        - Repeated within 7 days
        - Repeated within 8–30 days
        - Repeated after more than 30 days
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I reviewed this issue and it contains no plist contents, labels, filenames, paths, logs, tokens, credentials, or account details.
          required: true
