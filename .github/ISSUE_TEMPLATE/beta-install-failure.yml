name: External beta installation failure
description: Report a privacy-safe installation or command-start failure without diagnostic output.
title: "[Beta install] "
labels:
  - beta-feedback
body:
  - type: markdown
    attributes:
      value: |
        Use this form only when installation, `--version`, or the scan could not start. GitHub issues are public.

        Never paste or upload terminal output, a report, plist, label, filename, path, log, screenshot, token, credential, or account detail.
  - type: checkboxes
    id: eligibility
    attributes:
      label: External operator eligibility
      options:
        - label: I am not the project owner and this is not owner-operated QA, a bot, or CI.
          required: true
        - label: I intended to scan at least three user LaunchAgents on this Mac.
          required: true
  - type: dropdown
    id: install
    attributes:
      label: Installation method attempted
      options:
        - Homebrew
        - GitHub Release
        - Built from source
    validations:
      required: true
  - type: dropdown
    id: failed_stage
    attributes:
      label: Stage that failed
      options:
        - Installation did not complete
        - The version command did not start
        - The scan command did not start
        - The command returned usage error - exit 2
    validations:
      required: true
  - type: dropdown
    id: error_class
    attributes:
      label: Generic error category
      options:
        - Command not found
        - Build or dependency failure
        - macOS security blocked launch
        - Invalid command usage
        - Permission denied
        - Other or unsure
    validations:
      required: true
  - type: dropdown
    id: architecture
    attributes:
      label: Mac architecture
      options:
        - Apple silicon
        - Intel
        - Unsure
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I included only form choices; no terminal output, report, plist, identifiers, paths, logs, screenshots, secrets, or account details.
          required: true
