name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Test
        run: swift test
      - name: Build Universal binary
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          swift build -c release --arch arm64
          cp .build/arm64-apple-macosx/release/agentlaunch-doctor /tmp/agentlaunch-doctor-arm64
          swift build -c release --arch x86_64
          cp .build/x86_64-apple-macosx/release/agentlaunch-doctor /tmp/agentlaunch-doctor-x86_64
          mkdir -p dist
          lipo -create /tmp/agentlaunch-doctor-arm64 /tmp/agentlaunch-doctor-x86_64 -output dist/agentlaunch-doctor
          codesign --force --sign - dist/agentlaunch-doctor
          test "$(dist/agentlaunch-doctor --version)" = "$VERSION"
          lipo dist/agentlaunch-doctor -verify_arch arm64 x86_64
          codesign --verify --strict --verbose=2 dist/agentlaunch-doctor
          (cd dist && ditto -c -k agentlaunch-doctor agentlaunch-doctor-macos-universal.zip)
          (cd dist && shasum -a 256 agentlaunch-doctor-macos-universal.zip > SHA256SUMS)
          test "$(zipinfo -1 dist/agentlaunch-doctor-macos-universal.zip)" = "agentlaunch-doctor"
          (cd dist && shasum -a 256 -c SHA256SUMS)
      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            dist/agentlaunch-doctor-macos-universal.zip \
            dist/SHA256SUMS \
            --title "AgentLaunch Doctor $GITHUB_REF_NAME" \
            --draft \
            --generate-notes
      - name: Verify published artifacts and publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p verified
          gh release download "$GITHUB_REF_NAME" --dir verified
          (cd verified && shasum -a 256 -c SHA256SUMS)
          mkdir -p verified/extracted
          unzip -q verified/agentlaunch-doctor-macos-universal.zip -d verified/extracted
          test "$(find verified/extracted -type f | wc -l | tr -d ' ')" = "1"
          test -f verified/extracted/agentlaunch-doctor
          test "$(verified/extracted/agentlaunch-doctor --version)" = "$VERSION"
          lipo verified/extracted/agentlaunch-doctor -verify_arch arm64 x86_64
          codesign --verify --strict --verbose=2 verified/extracted/agentlaunch-doctor
          gh release edit "$GITHUB_REF_NAME" --draft=false
