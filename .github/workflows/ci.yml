name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Test
        run: swift test
      - name: Release build
        run: swift build -c release
      - name: CLI smoke test
        run: .build/release/agentlaunch-doctor --version
      - name: Distribution script syntax
        run: bash -n scripts/sign-and-notarize.sh
  intel-verify:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Confirm Intel runner
        run: test "$(uname -m)" = "x86_64"
      - name: Test
        run: swift test
      - name: Release build
        run: swift build -c release
      - name: Intel CLI smoke test
        run: |
          file .build/release/agentlaunch-doctor | grep -q "Mach-O 64-bit executable x86_64"
          .build/release/agentlaunch-doctor --version
